<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Broma</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  background: radial-gradient(ellipse at bottom, #0d1b2a 0%, #000000 100%);
  font-family: 'Comic Sans MS', cursive;
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: 80px; /* más abajo */
}

/* LIBRO EXTERNO */
.book-wrapper {
  background: linear-gradient(145deg, #8b5a2b, #5a3b1a);
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.8);
}

.book {
  display: flex;
  gap: 10px;
  background: #caa472;
  padding: 15px;
  border-radius: 10px;
}

/* PÁGINAS */
.page {
  width: 250px;
  height: 350px;
  background: #fff8f0;
  border-radius: 8px;
  padding: 15px;
  box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
  overflow-y: auto;
}

.page:focus {
  outline: 2px solid #4da8da;
}

/* LOMO DEL LIBRO */
.spine {
  width: 20px;
  background: #5a3b1a;
  border-radius: 5px;
}

.controls {
  margin-top: 20px;
  display: flex;
  gap: 10px;
}

button {
  background-color: #1b263b;
  color: #dcefff;
  border: none;
  padding: 10px 20px;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background-color: #415a77;
}
</style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="container">
  <div class="book-wrapper">
    <div class="book">
      <div class="page" contenteditable="true" id="leftPage">No va a ser tan fácil...</div>
      <div class="spine"></div>
      <div class="page" contenteditable="true" id="rightPage">Intenta desbloquear mi celular</div>
    </div>
  </div>

  <div class="controls">
    <button onclick="prevPage()">⟵ Anterior</button>
    <button onclick="nextPage()">Siguiente ⟶</button>
  </div>
</div>

<script>
// LIBRO
let pages = [{ left: "", right: "" }];
let currentPage = 0;

const leftPage = document.getElementById("leftPage");
const rightPage = document.getElementById("rightPage");

function savePage() {
  pages[currentPage].left = leftPage.innerHTML;
  pages[currentPage].right = rightPage.innerHTML;
}

function loadPage() {
  leftPage.innerHTML = pages[currentPage].left || "";
  rightPage.innerHTML = pages[currentPage].right || "";
}

function nextPage() {
  savePage();
  currentPage++;

  if (!pages[currentPage]) {
    pages[currentPage] = { left: "", right: "" };
  }

  loadPage();
}

function prevPage() {
  if (currentPage === 0) return;
  savePage();
  currentPage--;
  loadPage();
}

// ESTRELLAS
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
let stars = [], shootingStars = [];

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  initStars();
}

function initStars() {
  stars = [];
  for (let i = 0; i < 300; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      radius: Math.random() * 1.5,
      alpha: Math.random(),
      delta: Math.random() * 0.02,
      color: Math.random() < 0.8 ? 'white' : 'yellow'
    });
  }
}

function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let star of stars) {
    ctx.beginPath();
    ctx.globalAlpha = star.alpha;
    ctx.fillStyle = star.color;
    ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
    ctx.fill();

    star.alpha += star.delta;
    if (star.alpha <= 0 || star.alpha >= 1) star.delta *= -1;
  }

  for (let i = shootingStars.length - 1; i >= 0; i--) {
    const s = shootingStars[i];
    ctx.beginPath();
    const grad = ctx.createLinearGradient(s.x, s.y, s.x + s.length, s.y + s.length);
    grad.addColorStop(0, 'white');
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.strokeStyle = grad;
    ctx.lineWidth = 2;
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(s.x + s.length, s.y + s.length);
    ctx.stroke();

    s.x += s.vx;
    s.y += s.vy;
    s.life--;

    if (s.life <= 0) shootingStars.splice(i, 1);
  }

  ctx.globalAlpha = 1;
  requestAnimationFrame(drawStars);
}

function createShootingStar() {
  shootingStars.push({
    x: Math.random() * canvas.width * 0.8,
    y: Math.random() * canvas.height * 0.5,
    vx: 10,
    vy: 10,
    length: Math.random() * 80 + 50,
    life: 20 + Math.random() * 10
  });
}

setInterval(() => {
  for (let i = 0; i < Math.floor(Math.random() * 3) + 1; i++) {
    setTimeout(createShootingStar, i * 300);
  }
}, 5000);

window.addEventListener('resize', resize);
resize();
drawStars();
</script>

</body>
</html>
